<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Giriş | Bekir Yılmaz</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-card {
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 20px;
            padding: 48px 40px;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
        }
        .login-logo {
            text-align: center;
            margin-bottom: 32px;
        }
        .login-logo .icon {
            width: 64px; height: 64px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            border-radius: 16px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            color: white;
            margin-bottom: 16px;
        }
        .login-logo h1 {
            color: white;
            font-size: 24px;
            font-weight: 700;
        }
        .login-logo p {
            color: rgba(255,255,255,0.5);
            font-size: 14px;
            margin-top: 4px;
        }
        .form-group { margin-bottom: 20px; }
        .form-label {
            display: block;
            color: rgba(255,255,255,0.7);
            font-size: 13px;
            font-weight: 500;
            margin-bottom: 8px;
        }
        .form-input {
            width: 100%;
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 10px;
            padding: 12px 16px;
            color: white;
            font-size: 15px;
            font-family: inherit;
            outline: none;
            transition: border-color .2s;
        }
        .form-input:focus { border-color: #667eea; }
        .form-input::placeholder { color: rgba(255,255,255,0.3); }
        .btn-login {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            border: none;
            border-radius: 10px;
            color: white;
            font-size: 16px;
            font-weight: 600;
            font-family: inherit;
            cursor: pointer;
            transition: opacity .2s, transform .1s;
            margin-top: 8px;
        }
        .btn-login:hover { opacity: .9; }
        .btn-login:active { transform: scale(.98); }
        .error-msg {
            background: rgba(239,68,68,.15);
            border: 1px solid rgba(239,68,68,.3);
            border-radius: 8px;
            color: #fca5a5;
            padding: 10px 14px;
            font-size: 14px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .back-link {
            text-align: center;
            margin-top: 20px;
        }
        .back-link a {
            color: rgba(255,255,255,0.4);
            font-size: 13px;
            text-decoration: none;
            transition: color .2s;
        }
        .back-link a:hover { color: rgba(255,255,255,0.7); }
    </style>
</head>
<body>
<div class="login-card">
    <div class="login-logo">
        <div class="icon"><i class="fas fa-shield-alt"></i></div>
        <h1>Admin Paneli</h1>
        <p>Bekir Yılmaz Portfolio</p>
    </div>

    {% if error %}
    <div class="error-msg">
        <i class="fas fa-exclamation-circle"></i>
        {{ error }}
    </div>
    {% endif %}

    <form method="POST" action="{{ url_for('admin_login') }}">
        <div class="form-group">
            <label class="form-label" for="username">
                <i class="fas fa-user"></i> Kullanıcı Adı
            </label>
            <input type="text" id="username" name="username" class="form-input"
                   placeholder="Kullanıcı adınız" required autocomplete="username">
        </div>
        <div class="form-group">
            <label class="form-label" for="password">
                <i class="fas fa-lock"></i> Şifre
            </label>
            <input type="password" id="password" name="password" class="form-input"
                   placeholder="••••••••" required autocomplete="current-password">
        </div>
        <button type="submit" class="btn-login">
            <i class="fas fa-sign-in-alt"></i> Giriş Yap
        </button>
    </form>

    <div class="back-link">
        <a href="{{ url_for('index') }}"><i class="fas fa-arrow-left"></i> Siteye Dön</a>
    </div>
</div>
</body>
</html>
